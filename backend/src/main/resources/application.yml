spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/myhouse_db?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Seoul
    username: myhouse
    password: myhouse1234
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      connection-init-sql: "SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci"

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
        default_batch_fetch_size: 100

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 15MB

  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  error:
    include-message: always
    include-binding-errors: always

# JWT 설정
jwt:
  secret: myhouse-super-secret-key-for-jwt-token-generation-2026
  expiration: 86400000   # 24시간 (ms)
  refresh-expiration: 604800000  # 7일 (ms)

# 로깅
logging:
  level:
    com.myhouse: DEBUG
    org.springframework.security: INFO
