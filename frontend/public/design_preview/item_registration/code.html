<div class="bg-surface-container-lowest p-6 rounded-xl shadow-[0_4px_24px_rgba(0,0,0,0.02)]">
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-3">Room Selection</label>
<div class="relative">
<select class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary/20 appearance-none font-medium">
<option value="">Select a location...</option>
<option>Living Room</option>
<option>Kitchen</option>
<option>Bedroom</option>
<option>Home Office</option>
<option>Bathroom</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>

<div class="bg-surface-container-lowest p-6 rounded-xl shadow-[0_4px_24px_rgba(0,0,0,0.02)] space-y-5">
<div class="space-y-2">
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest">Product Name</label>
<input class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20" placeholder="e.g. Ergonomic Desk Chair" type="text"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest">Manufacturer</label>
<input class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20" placeholder="e.g. Steelcase" type="text"/>
</div>
<div class="space-y-2">
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest">Model</label>
<input class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20" placeholder="e.g. Gesture" type="text"/>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest">Price</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-medium">$</span>
<input class="w-full bg-surface-container-low border-none rounded-lg pl-8 pr-4 py-3 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20" placeholder="0.00" type="number"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest">Registration Date</label>
<input class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary/20" type="date"/>

</div>

<div>
<p class="font-headline font-bold text-on-surface">Repurchase intent</p>

</div>
<label class="relative inline-flex items-center cursor-pointer">

</label>
